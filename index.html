<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת חכמה לשיבוץ מורים</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>מערכת חכמה לשיבוץ מורים</h1>
            <p>ניהול ומעקב אחר שעות ההוראה בבית הספר</p>
        </div>
    </header>

    <main class="container">
        <!-- Version Control -->
        <div class="version-control glass-card" style="margin-bottom: 20px; padding: 15px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label for="version-select" style="font-weight: 600; color: var(--primary-color);">גרסה (Version):</label>
                <select id="version-select" style="width: 250px; margin: 0; padding: 8px 15px; font-weight: bold;"></select>
            </div>
            <div class="version-actions" style="display: flex; gap: 10px;">
                <button id="create-copy-btn" class="btn-primary" style="margin: 0; background-color: #9b59b6; border-color: #9b59b6; padding: 8px 20px;">שכפל גרסה 📑</button>
                <button id="rename-version-btn" class="btn-primary" style="margin: 0; background-color: #34495e; border-color: #34495e; padding: 8px 20px;">שנה שם ✏️</button>
            </div>
        </div>

        <!-- Tabs Navigation -->
        <div class="tabs-nav">
            <button class="tab-btn active" data-tab="tab-teachers">1. נתוני מורים</button>
            <button class="tab-btn" data-tab="tab-schedule">2. שיבוץ שעות מרכזי</button>
        </div>

        <!-- Tab 1: Teachers Data -->
        <div id="tab-teachers" class="tab-content active">
            <div class="teachers-layout">
                <aside class="sidebar">
                    <section class="glass-card add-teacher-section">
                        <h2>הוספת מורה</h2>
                        <form id="add-teacher-form">
                            <div class="form-group">
                                <label for="teacher-name">שם המורה</label>
                                <input type="text" id="teacher-name" placeholder="למשל: יעל כהן" required>
                            </div>
                            <div class="form-group">
                                <label for="teacher-max-hours">מכסת שעות שבועית</label>
                                <input type="number" id="teacher-max-hours" placeholder="למשל: 30" required min="1">
                            </div>
                            <button type="submit" class="btn-primary">הוסף מורה +</button>
                        </form>
                    </section>
                </aside>

                <section class="glass-card teachers-list-section">
                    <h2>מצב שעות - כל המורים</h2>
                    <div class="teachers-stats">
                        <p>סה"כ מורים: <span id="total-teachers">0</span></p>
                    </div>
                    <div id="teachers-list" class="teachers-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; flex-direction: unset;">
                        <div class="empty-state" style="grid-column: 1 / -1;">לא הוגדרו מורים עדיין. הוסף מורה כדי להתחיל.</div>
                    </div>
                </section>
            </div>
        </div>

        <!-- Tab 2: Schedule Table -->
        <div id="tab-schedule" class="tab-content">
            <section class="main-content glass-card">
                <div class="table-header">
                    <h2>טבלת שיבוץ רחבה</h2>
                    <div class="table-actions">
                        <button id="save-board-btn" class="btn-primary" style="margin-left: 10px; background-color: #2ecc71; border-color: #2ecc71;">حفظ التعديلات 💾</button>
                        <button id="revert-board-btn" class="btn-primary" style="margin-left: 10px; background-color: #f39c12; border-color: #f39c12;">تراجع ↩️</button>
                        <button id="export-pdf-btn" class="btn-primary" style="margin-left: 10px; background-color: #d32f2f; border-color: #d32f2f;">ייצוא ל-PDF</button>
                        <button id="export-excel-btn" class="btn-primary" style="margin-left: 10px; background-color: #2e7d32; border-color: #2e7d32;">ייצוא לאקסל</button>
                        <button id="clear-board-btn" class="btn-danger">ניקוי לוח</button>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table id="schedule-table">
                        <thead>
                            <tr>
                                <th rowspan="2">מקצוע / כיתה</th>
                                <th colspan="3">א'</th>
                                <th colspan="3">ב'</th>
                                <th colspan="3">ג'</th>
                                <th colspan="3">ד'</th>
                                <th colspan="3">ה'</th>
                                <th colspan="4">ו'</th>
                                <th rowspan="2" class="total-header">סה"כ<br>שעות</th>
                            </tr>
                            <tr id="homeroom-row">
                                <!-- JS will populate the homeroom dropdowns here -->
                            </tr>
                        </thead>
                        <tbody id="schedule-body">
                            <!-- השורות ייווצרו על ידי JavaScript -->
                        </tbody>
                        <tfoot id="schedule-footer">
                            <!-- Column totals will be generated by JavaScript -->
                        </tfoot>
                    </table>
                </div>
            </section>
        </div>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
